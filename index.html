<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>拼豆猫</title>
    <style>
      :root {
        --phone-w: min(430px, 100vw);
        --phone-h: min(932px, 100vh);
        --bg-1: #f5e6c8;
        --bg-2: #e7d1a4;
        --ink: #1e1b26;
        --ink-soft: #5e5b67;
        --line: #312d3c;
        --panel: #fff4d9;
        --gold: #d09c33;
        --danger: #d84b52;
        --ok: #1fae75;
        --blue: #72c5ff;
        --red: #ff7f96;
        --green: #69d8a7;
        --yellow: #ffd86f;
        --purple: #b89cff;
        --pixel-shadow: 4px 4px 0 #312d3c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.22) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(255, 255, 255, 0.22) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.22) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.22) 75%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2));
        background-size: 20px 20px, 20px 20px, 20px 20px, 20px 20px, 100% 100%;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0, 0 0;
        font-family: "Press Start 2P", "Pixelify Sans", "ZCOOL QingKe HuangYou", "PingFang SC", monospace;
        color: var(--ink);
        overflow-x: hidden;
      }

      button {
        touch-action: manipulation;
      }

      button:focus-visible {
        outline: 3px solid #2b6dde;
        outline-offset: 2px;
      }

      .phone {
        width: var(--phone-w);
        height: var(--phone-h);
        max-height: 100vh;
        border-radius: 16px;
        border: 3px solid var(--line);
        box-shadow: 8px 8px 0 #312d3c;
        background: #f9e9c5;
        overflow: hidden;
        position: relative;
      }
      .phone.hard-mode {
        border-color: #b3252a;
        box-shadow: 8px 8px 0 #7e1b20, 0 0 0 3px rgba(216, 75, 82, 0.35) inset;
        animation: alarmGlow 0.85s steps(2, end) infinite;
      }

      .screen {
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: calc(env(safe-area-inset-top, 0px) + 16px) 14px calc(env(safe-area-inset-bottom, 0px) + 14px);
        gap: 12px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        padding: 10px 12px;
        border-radius: 8px;
        background: #fff8e7;
        border: 2px solid var(--line);
        box-shadow: var(--pixel-shadow);
        gap: 8px;
      }
      .phone.hard-mode .topbar {
        background: #ffe3e1;
        border-color: #9a2f33;
      }
      .phone.hard-mode .timer {
        color: #8e2025;
      }

      .badge {
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        color: #563f1a;
        background: #ffd980;
        border: 2px solid #90652a;
      }
      .phone.hard-mode .badge {
        background: #ffb1b6;
        color: #6f181d;
        border-color: #8e2025;
      }

      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 800;
        font-size: 18px;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .run-stats {
        font-size: 12px;
        color: var(--ink-soft);
      }
      .hard-badge {
        font-size: 12px;
        color: #fff;
        background: #c0262d;
        border: 2px solid #6c1115;
        border-radius: 6px;
        padding: 4px 6px;
        animation: hardBlink 0.7s steps(2, end) infinite;
      }
      .hard-badge.hidden {
        display: none;
      }

      .sound-btn {
        min-width: 44px;
        min-height: 44px;
        border: 2px solid var(--line);
        border-radius: 6px;
        background: #fffdf4;
        color: var(--ink);
        font-size: 12px;
        padding: 0 8px;
        cursor: pointer;
      }
      .share-btn {
        min-width: 44px;
        min-height: 44px;
        border: 2px solid var(--line);
        border-radius: 6px;
        background: #e7f3ff;
        color: #1f3f77;
        font-size: 12px;
        padding: 0 8px;
        cursor: pointer;
      }
      .control-bar {
        display: flex;
        gap: 8px;
      }
      .control-btn {
        min-height: 40px;
        border: 2px solid var(--line);
        border-radius: 6px;
        background: #fffdf4;
        color: var(--ink);
        font-size: 12px;
        padding: 0 10px;
        cursor: pointer;
      }
      .control-btn.hidden {
        display: none;
      }

      .timer.warn {
        color: var(--danger);
        animation: pulse 0.7s infinite;
      }

      .phase-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }

      .target-row {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 10px;
      }

      .panel {
        border-radius: 8px;
        border: 2px solid var(--line);
        background: var(--panel);
        box-shadow: var(--pixel-shadow);
      }

      .target-mini {
        padding: 10px;
        display: grid;
        place-items: center;
      }

      .mini-grid {
        width: 70px;
        height: 70px;
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 2px;
        background: #8f8a9e;
        border-radius: 2px;
        overflow: hidden;
      }

      .mini-cell {
        background: rgba(255, 255, 255, 0.8);
      }

      .mini-cell.fill {
        border-radius: 2px;
      }

      .progress-board {
        padding: 10px 12px;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .progress-item {
        background: #fffdf4;
        border: 2px solid var(--line);
        border-radius: 6px;
        padding: 8px 6px;
        text-align: center;
      }

      .progress-item .dot {
        width: 18px;
        height: 18px;
        margin: 0 auto 4px;
        border-radius: 50%;
        border: 2px solid rgba(0, 0, 0, 0.15);
      }

      .progress-item strong {
        display: block;
        font-size: 15px;
      }

      .progress-item small {
        color: var(--ink-soft);
        font-size: 12px;
      }

      .board-wrap {
        flex: 1;
        min-height: 0;
        padding: 10px;
        display: grid;
        place-items: center;
      }

      .board,
      .craft-grid {
        width: min(100%, 390px);
        aspect-ratio: 1;
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 4px;
      }

      .cell,
      .craft-cell {
        border-radius: 2px;
        border: 2px solid rgba(68, 72, 80, 0.32);
        position: relative;
        cursor: pointer;
        aspect-ratio: 1;
        min-width: 0;
        min-height: 0;
        padding: 0;
      }

      .cell {
        background: #fff9eb;
        display: grid;
        place-items: center;
      }

      .cell.selected {
        outline: 3px solid #ff8f42;
        transform: scale(1.03);
      }

      .bean {
        width: 82%;
        height: auto;
        aspect-ratio: 1;
        border-radius: 50%;
        border: 2px solid rgba(30, 27, 38, 0.35);
        box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.15), inset 2px 2px 0 rgba(255, 255, 255, 0.25);
      }

      .collect-footer {
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .steps {
        font-variant-numeric: tabular-nums;
        font-size: 17px;
        font-weight: 700;
      }

      .craft-grid {
        background: #e7eaf1;
        border-radius: 4px;
        padding: 8px;
      }

      .craft-cell {
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.78);
      }

      .craft-cell.target {
        border-style: solid;
        border-color: rgba(66, 72, 88, 0.5);
      }

      .craft-cell.wrong {
        animation: shake 0.25s linear;
        background: rgba(216, 75, 82, 0.24);
      }

      .outline-dot {
        width: 42%;
        height: auto;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--hint-color, rgba(125, 134, 149, 0.3));
        border: 1px dashed rgba(40, 44, 54, 0.25);
      }

      .resource-panel {
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .resource-btn {
        border: 2px solid var(--line);
        background: #fffdf4;
        border-radius: 6px;
        padding: 8px 4px;
        text-align: center;
        cursor: pointer;
        min-height: 52px;
      }

      .resource-btn.active {
        border-color: #ff8f42;
        box-shadow: 0 0 0 2px rgba(255, 143, 66, 0.2);
      }

      .resource-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .resource-btn .dot {
        width: 20px;
        height: 20px;
        margin: 0 auto 4px;
        border-radius: 50%;
        border: 2px solid rgba(0, 0, 0, 0.15);
      }

      .toast {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 112px;
        background: rgba(25, 29, 33, 0.88);
        color: #fff;
        padding: 10px 14px;
        border-radius: 6px;
        border: 2px solid #fff;
        font-size: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s;
      }

      .toast.show {
        opacity: 1;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(9, 14, 21, 0.88), rgba(22, 28, 40, 0.9));
        color: #f7f9ff;
        display: grid;
        place-items: center;
        text-align: center;
        z-index: 12;
      }
      .menu-overlay {
        z-index: 16;
      }

      .overlay.hidden {
        display: none;
      }

      .overlay-card {
        width: min(86%, 360px);
        background: rgba(255, 255, 255, 0.12);
        border: 2px solid rgba(255, 255, 255, 0.24);
        border-radius: 8px;
        padding: 18px;
      }

      .overlay h2 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .overlay p {
        margin: 0;
        color: rgba(255, 255, 255, 0.86);
      }

      .overlay .need-list {
        margin-top: 12px;
        display: flex;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .menu-actions {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .menu-btn {
        border: 2px solid #fff;
        border-radius: 6px;
        min-height: 44px;
        min-width: 88px;
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        font-size: 12px;
        cursor: pointer;
        padding: 0 10px;
      }

      .need {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
      }

      .result {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(14, 19, 28, 0.7);
        z-index: 14;
      }

      .result.hidden {
        display: none;
      }

      .result-card {
        width: min(86%, 360px);
        border-radius: 8px;
        border: 2px solid var(--line);
        background: #fff7e2;
        padding: 18px;
        text-align: center;
      }

      .result-card h3 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .result-card p {
        margin: 0 0 14px;
        color: var(--ink-soft);
      }

      .result-card button {
        border: 2px solid #1f3f77;
        border-radius: 6px;
        padding: 10px 18px;
        cursor: pointer;
        color: #fff;
        background: #2b6dde;
        min-height: 44px;
      }
      .leaderboard {
        margin: 10px 0 14px;
        padding: 8px;
        border: 2px solid var(--line);
        border-radius: 6px;
        background: #fffdf4;
        text-align: left;
      }
      .leaderboard h4 {
        margin: 0 0 6px;
        font-size: 12px;
      }
      .leaderboard ol {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 4px;
        font-size: 12px;
      }
      .leaderboard li {
        color: var(--ink-soft);
      }
      .leaderboard li.current {
        color: var(--ink);
        font-weight: 700;
      }
      .stats-strip {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .stat-pill {
        border: 2px solid rgba(255, 255, 255, 0.24);
        border-radius: 6px;
        padding: 10px 8px;
        background: rgba(255, 255, 255, 0.08);
      }
      .stat-pill strong {
        display: block;
        font-size: 16px;
        color: #fff;
      }
      .stat-pill span {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.8);
      }
      .help-copy {
        margin-top: 12px;
        text-align: left;
        display: grid;
        gap: 8px;
        font-size: 12px;
        line-height: 1.6;
      }
      .help-copy strong {
        color: #fff;
      }

      .iron-sweep {
        pointer-events: none;
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent 25%, rgba(255, 255, 255, 0.62) 48%, rgba(176, 199, 255, 0.66) 56%, transparent 76%);
        transform: translateX(-130%);
        opacity: 0;
        z-index: 13;
      }

      .iron-sweep.play {
        animation: iron 900ms ease-out;
      }

      .phase-hidden {
        display: none !important;
      }

      @keyframes iron {
        0% {
          opacity: 0;
          transform: translateX(-130%);
        }
        10% {
          opacity: 1;
        }
        100% {
          opacity: 1;
          transform: translateX(130%);
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes hardBlink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
        100% {
          opacity: 1;
        }
      }
      @keyframes alarmGlow {
        0% {
          box-shadow: 8px 8px 0 #7e1b20, 0 0 0 2px rgba(216, 75, 82, 0.25) inset;
        }
        100% {
          box-shadow: 8px 8px 0 #7e1b20, 0 0 0 5px rgba(216, 75, 82, 0.45) inset;
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }

      @media (max-width: 420px) {
        .progress-item strong {
          font-size: 14px;
        }
        .resource-panel {
          gap: 6px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="phone" id="app">
      <div class="screen">
        <div class="topbar panel">
          <span class="badge" id="phaseLabel">阶段一 · 收集豆子</span>
          <div class="topbar-right">
            <span class="run-stats" id="runStats">Lv.1 · 0分</span>
            <span class="hard-badge hidden" id="hardBadge">警报</span>
            <span class="timer" id="timerText">步数 24</span>
            <div class="control-bar">
              <button id="helpBtn" class="control-btn" type="button" aria-label="查看玩法说明">说明</button>
              <button id="pauseBtn" class="control-btn hidden" type="button" aria-label="暂停或继续游戏">暂停</button>
              <button id="restartGameBtn" class="control-btn hidden" type="button" aria-label="重新开始游戏">重开</button>
            </div>
            <button id="soundBtn" class="sound-btn" type="button" aria-label="切换音效">音效开</button>
            <button id="shareBtn" class="share-btn" type="button" aria-label="分享游戏">分享</button>
          </div>
        </div>

        <div class="phase-wrap" id="collectPhase">
          <div class="target-row">
            <div class="target-mini panel">
              <div class="mini-grid" id="miniTarget"></div>
            </div>
            <div class="progress-board panel" id="progressBoard"></div>
          </div>

          <div class="board-wrap panel">
            <div class="board" id="board"></div>
          </div>

          <div class="collect-footer panel">
            <span>剩余步数</span>
            <span class="steps" id="stepText">24</span>
          </div>
        </div>

        <div class="phase-wrap phase-hidden" id="craftPhase">
          <div class="board-wrap panel">
            <div class="craft-grid" id="craftGrid"></div>
          </div>
          <div class="resource-panel panel" id="resourcePanel"></div>
        </div>
      </div>

      <div class="overlay" id="introOverlay">
        <div class="overlay-card">
          <h2 id="introTitle">目标图案</h2>
          <p id="introDesc">先收集，再拼搭。3 秒后开始收集阶段</p>
          <div class="mini-grid" id="overlayMini" style="margin: 12px auto 0"></div>
          <div class="need-list" id="needList"></div>
        </div>
      </div>

      <div class="overlay menu-overlay" id="startLayer">
        <div class="overlay-card">
          <h2>拼豆猫</h2>
          <p>随机小动物拼豆闯关，挑战你的最高分。</p>
          <div class="stats-strip">
            <div class="stat-pill">
              <strong id="bestScore">0</strong>
              <span>最高分</span>
            </div>
            <div class="stat-pill">
              <strong id="bestLevel">0</strong>
              <span>最高通关</span>
            </div>
          </div>
          <div class="menu-actions">
            <button id="startGameBtn" class="menu-btn" type="button">开始游戏</button>
            <button id="helpMenuBtn" class="menu-btn" type="button">玩法说明</button>
            <button id="shareGameBtn" class="menu-btn" type="button">分享游戏</button>
          </div>
        </div>
      </div>

      <div class="overlay hidden" id="helpLayer">
        <div class="overlay-card">
          <h2>玩法说明</h2>
          <p>先收集颜色豆，再按目标图把小动物拼出来。</p>
          <div class="help-copy">
            <div><strong>阶段一：</strong>点击两个相邻豆子交换，凑成三个及以上同色即可消除并收集。</div>
            <div><strong>阶段二：</strong>选择下方颜色豆，放到对应的目标格里，颜色必须完全匹配。</div>
            <div><strong>失败条件：</strong>步数耗尽、棋盘无可走步，或拼搭倒计时结束。</div>
            <div><strong>技巧：</strong>优先凑目标里缺得最多的颜色，超难关会在每 5 关出现。</div>
          </div>
          <div class="menu-actions">
            <button id="closeHelpBtn" class="menu-btn" type="button">知道了</button>
          </div>
        </div>
      </div>

      <div class="overlay hidden" id="pauseLayer">
        <div class="overlay-card">
          <h2>已暂停</h2>
          <p id="pauseText">休息一下，准备好再继续。</p>
          <div class="menu-actions">
            <button id="resumeBtn" class="menu-btn" type="button">继续游戏</button>
            <button id="pauseRestartBtn" class="menu-btn" type="button">重新开始</button>
          </div>
        </div>
      </div>

      <div class="iron-sweep" id="ironSweep"></div>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>

      <div class="result hidden" id="resultLayer">
        <div class="result-card">
          <h3 id="resultTitle"></h3>
          <p id="resultText"></p>
          <div class="leaderboard">
            <h4>排行榜</h4>
            <ol id="leaderboardList"></ol>
          </div>
          <button id="restartBtn">再来一局</button>
        </div>
      </div>
    </div>
    <script src="./js/state.js"></script>
    <script src="./js/engine.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/audio.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
